<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Symptom AI Pro Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: 'Segoe UI';
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

h1 {
  color: #38bdf8;
}

button {
  padding: 12px 20px;
  margin: 8px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

.reset { background: #22c55e; }
.doctor { background: #ef4444; }
.medicine { background: #3b82f6; }
.rest { background: #f59e0b; }

.card {
  background: rgba(30, 41, 59, 0.8);
  margin: 10px;
  padding: 20px;
  border-radius: 12px;
  display: inline-block;
  width: 150px;
  box-shadow: 0px 0px 10px rgba(0,0,0,0.3);
}

canvas {
  margin-top: 30px;
  max-width: 700px;
}

</style>
</head>

<body>

<h1>🧠 Symptom AI Pro Dashboard</h1>

<button class="reset" onclick="resetEnv()">Reset</button>
<button class="doctor" onclick="stepEnv('doctor')">Doctor</button>
<button class="medicine" onclick="stepEnv('medicine')">Medicine</button>
<button class="rest" onclick="stepEnv('rest')">Rest</button>

<div>
  <div class="card">Severity: <span id="severity">-</span></div>
  <div class="card">Energy: <span id="energy">-</span></div>
  <div class="card">Immunity: <span id="immunity">-</span></div>
  <div class="card">Day: <span id="day">-</span></div>
</div>

<h3 id="suggestion"></h3>

<canvas id="chart"></canvas>

<script>

let chart;

function updateUI(data) {
  document.getElementById("severity").innerText = data.severity;
  document.getElementById("energy").innerText = data.energy;
  document.getElementById("immunity").innerText = data.immunity;
  document.getElementById("day").innerText = data.day;
  document.getElementById("suggestion").innerText = data.ai_suggestion;

  if (!chart) {
    const ctx = document.getElementById('chart');
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [
          { label: 'Severity', data: [], borderColor: '#ef4444' },
          { label: 'Energy', data: [], borderColor: '#22c55e' },
          { label: 'Immunity', data: [], borderColor: '#3b82f6' }
        ]
      }
    });
  }

  chart.data.labels.push("Day " + data.day);
  chart.data.datasets[0].data.push(data.severity);
  chart.data.datasets[1].data.push(data.energy);
  chart.data.datasets[2].data.push(data.immunity);
  chart.update();
}

async function resetEnv() {
  const res = await fetch("/reset");
  const data = await res.json();
  chart = null;
  updateUI(data);
}

async function stepEnv(action) {
  const res = await fetch("/step", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: action })
  });

  const data = await res.json();
  updateUI(data);

  if (data.done) {
    alert("✅ Simulation Completed!");
  }
}

</script>

</body>
</html>
